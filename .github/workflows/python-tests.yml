name: Python Unit Tests

on: [push]  # run every time when git push

jobs:
  build:
    runs-on: ubuntu-latest

    # Activate Redis and MongoDB
    services:
      redis:
        image: redis
        ports: ["6379:6379"]
      mongodb:
        image: mongo
        ports: ["27017:27017"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install redis pymongo faiss-cpu pytest
        
    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest