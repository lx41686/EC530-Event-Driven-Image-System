name: Python Unit Tests

on: [push]  # Trigger the workflow on every git push

jobs:
  build:
    runs-on: ubuntu-latest

    # Activate Redis and MongoDB services in the GitHub Actions runner
    services:
      redis:
        image: redis
        ports: ["6379:6379"]
      mongodb:
        image: mongo
        ports: ["27017:27017"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install standard requirements if the file exists
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Fallback: Manually ensure critical test dependencies are present
        pip install fastapi uvicorn python-multipart redis pymongo numpy pytest

    - name: Run Tests
      run: |
        # Ensure the root directory is in PYTHONPATH so 'services' can be found
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest